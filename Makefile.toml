[config]
skip_core_tasks = true
default_to_workspace = false

[tasks.default]
alias = "build"

[tasks.build]
description = "Convert all tar.gz files under sources/ and generate dist/index.html"
dependencies = ["convert-all", "index"]

[tasks.convert-all]
description = "Convert all sources/*.tar.gz files"
command = "rust-script"
args = ["scripts/convert_all.rs"]

[tasks.index]
description = "Generate dist/index.html"
command = "rust-script"
args = ["scripts/generate_index.rs", "dist", "DistTitles.toml"]

[tasks.clean]
description = "Remove generated work/ and dist/"
command = "rust-script"
args = ["scripts/clean.rs"]

[tasks.check-rust-script]
description = "Check rust-script"
command = "rust-script"
args = ["--version"]

[tasks.check-make4ht]
description = "Check make4ht"
command = "make4ht"
args = ["--version"]

[tasks.check]
description = "Check required tools"
dependencies = ["check-rust-script", "check-make4ht"]